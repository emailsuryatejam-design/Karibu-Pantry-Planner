<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ea580c">
    <title>Offline — Karibu Pantry Planner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f9fafb;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100dvh;
            padding: 24px;
            text-align: center;
        }
        .container { max-width: 320px; }
        .icon {
            width: 64px; height: 64px; margin: 0 auto 20px;
            background: #fff7ed; border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
        }
        h1 { font-size: 18px; font-weight: 700; color: #1f2937; margin-bottom: 8px; }
        p { font-size: 14px; color: #6b7280; line-height: 1.5; margin-bottom: 24px; }
        button {
            background: #ea580c; color: white; border: none; padding: 12px 32px;
            border-radius: 12px; font-size: 14px; font-weight: 600;
            cursor: pointer; transition: background 0.2s;
        }
        button:active { background: #c2410c; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#ea580c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="1" x2="23" y1="1" y2="23"/>
                <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
                <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
                <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
                <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
                <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
                <line x1="12" x2="12.01" y1="20" y2="20"/>
            </svg>
        </div>
        <h1>You're Offline</h1>
        <p>Please check your internet connection and try again. Your data will sync once you're back online.</p>
        <button onclick="window.location.reload()">Try Again</button>
    </div>
</body>
</html>
